# pnpm workspace root.
#
# `game` (published to npm as hathora-et-labora-game), `agent` (the MCTS
# self-play tooling), and `web` (the Next.js/Vercel app) are all members, so
# both `agent` and `web` consume `game` via the `workspace:` protocol instead
# of reaching across folder boundaries or pinning a published version.
packages:
  - game
  - agent
  - web

# Give each workspace project its own pnpm-lock.yaml instead of a single shared
# one at the workspace root. All three projects commit their lockfiles: CI
# installs with --frozen-lockfile so test and publish runs are reproducible,
# and `agent` needs it for reproducible self-play/training runs.
sharedWorkspaceLockfile: false

# (moved here from game/pnpm-workspace.yaml)
allowBuilds:
  esbuild: true
# Supply-chain age gate disabled. pnpm 11 defaults minimumReleaseAge to 24h,
# which fails CI whenever a dependency bump (e.g. a Renovate eslint/prettier
# update) lands within that window. 0 turns it off; the exclude list is then
# moot and removed.
minimumReleaseAge: 0
onlyBuiltDependencies:
  - esbuild
